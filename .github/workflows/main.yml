name: Deploy to Hostinger
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install frontend deps
        run: |
          cd frontend
          npm install
      - name: Build frontend
        run: |
          cd frontend
          npm run build
      - name: Install admin deps
        run: |
          cd admin
          npm install
      - name: Build admin
        run: |
          cd admin
          npm run build
      - name: Check build output
        run: |
          echo "=== Frontend ==="
          ls -la backend/public/frontend/ || echo "MISSING"
          echo "=== Admin ==="
          ls -la backend/public/admin/ || echo "MISSING"
      - name: Deploy frontend
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          security: loose
          local-dir: backend/public/frontend/
          server-dir: /public_html/
      - name: Deploy admin
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          security: loose
          local-dir: backend/public/admin/
          server-dir: /public_html/admin/
      - name: Deploy public_html config
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          security: loose
          local-dir: deploy/public_html/
          server-dir: /public_html/
      - name: Deploy backend
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          security: loose
          local-dir: backend/
          server-dir: /backend/
          exclude: |
            **/vendor/**
            **/node_modules/**
            **/.git*
            **/.env
            **/public/frontend/**
            **/public/admin/**
            **/public/storage
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
      - name: Post-deploy (composer install + artisan)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 65002
          script: |
            BASE=/home/u679970628/domains/magenta-newt-861501.hostingersite.com
            cd $BASE/backend
            php composer.phar install --no-dev --optimize-autoloader 2>/dev/null || composer install --no-dev --optimize-autoloader
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan migrate --force
            chmod -R 775 storage
            chmod -R 775 bootstrap/cache
            STORAGE_LINK=$BASE/public_html/storage
            if [ -L "$STORAGE_LINK" ]; then rm "$STORAGE_LINK"; fi
            ln -s $BASE/backend/storage/app/public "$STORAGE_LINK"
