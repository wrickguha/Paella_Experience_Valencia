name: Deploy to Hostinger
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install frontend deps
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Install admin deps
        run: cd admin && npm install

      - name: Build admin
        run: cd admin && npm run build

      - name: Check build output
        run: |
          echo "=== Frontend ==="
          ls -la backend/public/frontend/ || echo "MISSING"
          echo "=== Admin ==="
          ls -la backend/public/admin/ || echo "MISSING"

      - name: Upload backend via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 65002
          timeout: 120s
          command_timeout: 30m
          source: "backend/"
          target: "/home/u679970628/domains/magenta-newt-861501.hostingersite.com/backend/"
          strip_components: 1

      - name: Upload frontend via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 65002
          timeout: 120s
          command_timeout: 30m
          source: "backend/public/frontend/"
          target: "/home/u679970628/domains/magenta-newt-861501.hostingersite.com/public_html/"
          strip_components: 3

      - name: Upload admin via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 65002
          timeout: 120s
          command_timeout: 30m
          source: "backend/public/admin/"
          target: "/home/u679970628/domains/magenta-newt-861501.hostingersite.com/public_html/admin/"
          strip_components: 3

      - name: Upload public_html config via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 65002
          timeout: 120s
          command_timeout: 30m
          source: "deploy/public_html/"
          target: "/home/u679970628/domains/magenta-newt-861501.hostingersite.com/public_html/"
          strip_components: 2

      - name: Post-deploy (composer + artisan + symlink)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 65002
          timeout: 120s
          command_timeout: 30m
          script: |
            BASE=/home/u679970628/domains/magenta-newt-861501.hostingersite.com
            mkdir -p $BASE/backend $BASE/public_html/admin
            cd $BASE/backend
            php composer.phar install --no-dev --optimize-autoloader 2>/dev/null || composer install --no-dev --optimize-autoloader
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan migrate --force
            chmod -R 775 storage bootstrap/cache
            STORAGE_LINK=$BASE/public_html/storage
            if [ -L "$STORAGE_LINK" ]; then rm "$STORAGE_LINK"; fi
            ln -s $BASE/backend/storage/app/public "$STORAGE_LINK"
            echo "=== Done ==="
            ls -la $BASE/public_html/
