name: Deploy to Hostinger
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
      # Build frontend
      - name: Install frontend deps
        run: |
          cd frontend
          npm install
      - name: Build frontend
        run: |
          cd frontend
          npm run build
      # Build admin
      - name: Install admin deps
        run: |
          cd admin
          npm install
      - name: Build admin
        run: |
          cd admin
          npm run build
      # Deploy frontend SPA
      - name: Deploy frontend
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          security: loose
          local-dir: backend/public/frontend/
          server-dir: /public_html/
      # Deploy admin SPA
      - name: Deploy admin
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          security: loose
          local-dir: backend/public/admin/
          server-dir: /public_html/admin/
      # Deploy .htaccess + api/ entry point
      - name: Deploy public_html config
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          security: loose
          local-dir: deploy/public_html/
          server-dir: /public_html/
      # Deploy Laravel backend (excluding vendor, built assets, env)
      - name: Deploy backend
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          security: loose
          local-dir: backend/
          server-dir: /public_html/backend/
          exclude: |
            **/vendor/**
            **/node_modules/**
            **/.git*
            **/.env
            **/public/frontend/**
            **/public/admin/**
            **/public/storage
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
      # Debug: find where files actually landed
      - name: Debug server paths
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 65002
          script: |
            echo "=== HOME DIR ==="
            ls -la ~/
            echo "=== PUBLIC_HTML ==="
            ls -la ~/public_html/
            echo "=== FINDING artisan ==="
            find ~/ -name "artisan" 2>/dev/null
            echo "=== FINDING composer.json ==="
            find ~/ -name "composer.json" 2>/dev/null | grep -v vendor
